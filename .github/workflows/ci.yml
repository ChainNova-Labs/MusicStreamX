name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main, 'feat/**', 'fix/**', 'chore/**']

jobs:
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/api-gateway

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        # --no-workspaces avoids workspace:* protocol errors from sibling packages
        run: npm install --no-workspaces --ignore-scripts

      - name: Type check
        run: npx tsc --noEmit

      - name: Run tests
        run: npm test

  frontend-test:
    name: Frontend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/music-player

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --no-workspaces

      - name: Type check
        run: npx tsc --noEmit

      - name: Run tests
        run: npm run test -- --passWithNoTests
