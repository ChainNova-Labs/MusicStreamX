name: CI

on:
  push:
    branches: [main, 'feat/**', 'fix/**']
  pull_request:
    branches: [main]

jobs:
  music-player-test:
    name: Music Player Tests (Freighter Wallet)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/music-player

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --no-workspaces

      - name: Type check
        run: npx tsc --noEmit

      - name: Run tests
        run: npm test
